    const canvas=document.querySelector("canvas")
    const ctx=canvas.getContext("2d")
    const re=document.getElementById("re")
    const easy=document.getElementById("easy")
    const normal=document.getElementById("normal")
    const hard=document.getElementById("hard")

    const ball={X:0, Y:0, R:10, speedX:0, speedY:0 }
    const bar={X:0, Y:canvas.height-40, W:100 , H: 20 }

    let bricks=[]
    let brick={row:4, col: 6, W:100, H:30, Gap:15}

    let gameOver
    let aniID

            ctx.fillStyle="black"
            ctx.fillRect(0, 0, canvas.width, canvas.height)
            ctx.fillStyle="white"
            ctx.font="bold 50px Jaro"
            ctx.textAlign="center"
            ctx.fillText("SELECT GAME MODE→", canvas.width/2, canvas.height/2)
            re.style.display="block"
            re.style.display="none"


    function startGame(){
        // 
        ball.X=canvas.width/2
        ball.Y=canvas.height-53

        // 
        bar.X=canvas.width/2-bar.W/2

        // 
        bricks=[]
        for(let row=0; row<brick.row; row++){
            for(let col=0; col<brick.col; col++){
                // 
                bricks.push({
                    x:55+col*(brick.W+brick.Gap),
                    y:50+row*(brick.H+brick.Gap),

                    // 
                    show:true,
                    color:`hsla(0, 0%, ${Math.random()*80}%)`
                })
            }
        }
        
        gameOver=false
        re.style.display="none"
        animate()

    }

    // 형태들을 그림
    function draw(){
        ctx.clearRect(0, 0, canvas.width, canvas.height)
        // 공
        ctx.beginPath()
        ctx.fillStyle="black"
        ctx.arc(ball.X, ball.Y, ball.R, 0, Math.PI*2)
        ctx.fill()
        //바
        ctx.beginPath()
        ctx.fillStyle="gray"
        ctx.fillRect(bar.X, bar.Y, bar.W, bar.H)
        ctx.fill()

        //벽돌
        for(let i=0; i<bricks.length; i++){
            if(bricks[i].show){
                ctx.fillStyle=bricks[i].color
                ctx.fillRect(bricks[i].x, bricks[i].y, brick.W, brick.H )
            }
        }
    }

    //게임종료
    function gameEnd(){
        gameOver=true
        cancelAnimationFrame(aniID)

        ctx.fillStyle="rgba(0, 0, 0, 0.8)"
        ctx.fillRect(0, 0, canvas.width, canvas.height)
        ctx.fillStyle="white"
        ctx.font="bold 40px sans-serif"
        ctx.textAlign="center"
        ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2.5)
        re.style.display="block"
    }

     function gameClear(){
        gameOver=true
        cancelAnimationFrame(aniID)

        ctx.fillStyle="black"
        ctx.fillRect(0, 0, canvas.width, canvas.height)
        ctx.fillStyle="white"
        ctx.font="bold 40px sans-serif"
        ctx.textAlign="center"
        ctx.fillText("GAME CLEAR", canvas.width/2, canvas.height/2.5)
        re.style.display="block"
    }

    //공 움직이기
    function move(){
        ball.X+=ball.speedX
        ball.Y+=ball.speedY

        if(ball.X+ball.R>canvas.width||ball.X-ball.R<0){
            ball.speedX=ball.speedX*-1
        }

         if(ball.Y-ball.R<0){
            ball.speedY=ball.speedY*-1
        }
        //공이 바에 닿았을 때
         if(ball.Y+ball.R>bar.Y && ball.X> bar.X && ball.X<bar.W+bar.X){
            ball.speedY=ball.speedY*-1
        }
        //공이 벽돌에 부딪혔을 때
        for(let i=0; i<bricks.length; i++){
            let b=bricks[i]
            if(b.show &&
                ball.X>b.x &&
                ball.X<b.x+brick.W &&
                ball.Y+ball.R>b.y &&
                ball.Y- ball.R< b.y+brick.H
            ){
                b.show=false
                ball.speedY=ball.speedY*-1
            }
        }
        //공이 바닥으로 떨어지면 게임 종료
        if(ball.Y-ball.R>canvas.height){
            gameEnd()
        }
    }
    function animate(){
        if(gameOver) return

        draw()
        move()
        aniID=requestAnimationFrame(animate)
    }

    //마우스로 움직이게 만들기
    canvas.addEventListener("mousemove", function(e){
        let rect=canvas.getBoundingClientRect()

        let mouseX=e.clientX-rect.left
        bar.X=mouseX-bar.W/2
        if(bar.X<0){
            bar.X=0
        }
        if(bar.X+bar.W>canvas.width){
            bar.X=canvas.width-bar.W
        }
    })

    // -------------------------------------
    let currentMode = null

function startByMode(mode){
    currentMode = mode

    if(mode === "easy"){
        bar.W = 200
        ball.speedX = 3
        ball.speedY = -3
        brick = {row:2, col:4, W:160, H:100, Gap:12}
    }

    if(mode === "normal"){
        bar.W = 100
        ball.speedX = 5
        ball.speedY = -5
        brick = {row:4, col:6, W:100, H:30, Gap:15}
    }

    if(mode === "hard"){
        bar.W = 60
        ball.speedX = 8
        ball.speedY = -8
        brick = {row:6, col:6, W:100, H:30, Gap:15}
    }

    startGame()
}

easy.addEventListener("click", function(){
    startByMode("easy")
})

normal.addEventListener("click", function(){
    startByMode("normal")
})

hard.addEventListener("click", function(){
    startByMode("hard")
})

re.addEventListener("click", function(){
    cancelAnimationFrame(aniID)
    startByMode(currentMode)
})
